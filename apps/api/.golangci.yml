version: "2"

formatters:
  enable:
    - gofumpt       # stricter gofmt: blank lines, grouping, trailing newlines
    - goimports     # organizes imports into 3 groups (stdlib / external / internal)
  settings:
    goimports:
      local-prefixes: level-up-backend
    gofumpt:
      module-path: level-up-backend
      extra-rules: true

linters:
  enable:
    # --- Correctness ---
    - govet
    - staticcheck
    - unused

    # --- Error handling ---
    - errcheck
    - errorlint

    # --- Naming & style ---
    - revive

    # --- Security ---
    - gosec

    # --- Code quality ---
    - gocritic
    - bodyclose
    - noctx

  settings:
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: increment-decrement
        - name: early-return
        - name: unused-parameter
        - name: superfluous-else
        - name: unused-receiver
        - name: exported
          disabled: true

    gosec:
      excludes:
        - G104

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - paramTypeCombine

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
    paths:
      - vendor

run:
  timeout: 5m
  modules-download-mode: readonly
