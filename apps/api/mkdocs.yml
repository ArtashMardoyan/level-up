# Documentation Portal — MkDocs Material configuration (ADR-0005).
# Isolated from docs/ content so the generator stays swappable (ADR-0005 §10).
# Phase P1: local build/serve of the whole docs/ tree. No hosting yet.

site_name: Level Up Documentation
site_description: Product, engineering, and architectural documentation for the Level Up platform.
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  custom_dir: mkdocs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

# Our docs use directory-style links (e.g. `product/`) so they navigate correctly
# both on GitHub (README) and in the built site (use_directory_urls → section index).
# MkDocs can't statically classify those, so silence that specific notice — but keep
# not_found as a real gate so genuinely-broken .md links still fail --strict.
validation:
  links:
    unrecognized_links: ignore
    not_found: warn

# Treat each folder's README.md as its section index, keeping README.md as the
# source file (GitHub still renders it; the docs source is unchanged).
hooks:
  - mkdocs/hooks/readme_index.py
